# .loopfix project config

version: 2

browser:
  tool: agent-browser
  headed: true

validation:
  default_scope: full
  max_fix_rounds: 3
  # Flow PASS requires last step + expects + no UNKNOWN + no unresolved blockers
  require_full_flow_pass: true

paths:
  index: browser/index.yaml
  probes: browser/probes
  actions: browser/actions
  knowledge: knowledge
  runs: runs
  references: references
