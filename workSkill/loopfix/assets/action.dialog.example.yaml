name: dialog
family: ui
description: Generic modal dialog open/confirm (framework-agnostic template)
version: 1

params:
  intent: open | close | confirm
  title: string?

steps:
  - when:
      intent: open
    do:
      - action: click
        target: "Open"
      - action: snapshot
  - when:
      intent: confirm
    do:
      - action: click
        target: "OK"
      - action: snapshot
  - when:
      intent: close
    do:
      - action: click
        target: "Cancel"
