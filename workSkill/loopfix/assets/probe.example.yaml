name: example-login
status: draft
goal: Login form is visible
base_url: http://localhost:3000
scope: targeted
tags: [example, auth]

prepare:
  - id: open
    action: open
    url: /login

verify:
  - id: check-form
    action: snapshot

expect:
  - type: no_console_errors
  - type: visible
    target: "Login"
