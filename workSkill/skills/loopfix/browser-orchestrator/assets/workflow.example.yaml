id: example-login
base_url: http://localhost:3000

steps:
  - id: open-page
    action:
      type: open
    params:
      url: /login

  - id: wait-load
    action:
      type: wait
    params:
      load: networkidle

  - id: analyze
    action:
      type: snapshot

  - id: verify
    expect:
      text_contains: Login
    action:
      type: snapshot
