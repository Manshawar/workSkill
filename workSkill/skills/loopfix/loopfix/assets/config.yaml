# .loopfix project config

version: 2

browser:
  tool: agent-browser
  headed: true
  # session: auto  → claude-<worktree-hash> via agent-browser session id --scope worktree --prefix claude
  # session: my-name → exact session override
  session: auto
  restore: true

validation:
  default_scope: full
  max_fix_rounds: 3
  require_full_flow_pass: true

paths:
  index: browser/index.yaml
  probes: browser/probes
  actions: browser/actions
  knowledge: knowledge
  runs: runs
  references: references
